name: 构建 OpenWrt 软件包

# ─── 触发条件 ────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════
  # Job 1: 编译 clientstatus C 守护进程
  # 手动下载 SDK，只用 src-link 本地 feed，完全不访问 git.openwrt.org
  # ════════════════════════════════════════════════════════
  build-daemon:
    name: Daemon [${{ matrix.sdk }}] ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── OpenWrt 23.05.5 (opkg · .ipk) ───────────────
          - sdk: 23.05.5
            arch: x86_64
            target: x86
            subtarget: "64"
          - sdk: 23.05.5
            arch: aarch64_generic
            target: armvirt
            subtarget: "64"
          - sdk: 23.05.5
            arch: arm_cortex-a7_neon-vfpv4
            target: sunxi
            subtarget: cortexa7
          - sdk: 23.05.5
            arch: mipsel_24kc
            target: ramips
            subtarget: mt7621
          - sdk: 23.05.5
            arch: mips_24kc
            target: ath79
            subtarget: generic
          # ── OpenWrt 24.10.1 (apk · .apk) ────────────────
          - sdk: 24.10.1
            arch: x86_64
            target: x86
            subtarget: "64"
          - sdk: 24.10.1
            arch: aarch64_generic
            target: armvirt
            subtarget: "64"
          - sdk: 24.10.1
            arch: arm_cortex-a7_neon-vfpv4
            target: sunxi
            subtarget: cortexa7
          - sdk: 24.10.1
            arch: mipsel_24kc
            target: ramips
            subtarget: mt7621

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential libncurses5-dev python3 rsync zstd

      - name: 下载 OpenWrt SDK
        run: |
          BASE="https://downloads.openwrt.org/releases/${{ matrix.sdk }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}"
          wget -q "${BASE}/sha256sums"
          # 从 sha256sums 自动解析 SDK 文件名，无需硬编码 GCC 版本
          SDK_FILE=$(grep -o 'openwrt-sdk[^[:space:]]*\.tar\.[a-z]*' sha256sums | head -1)
          echo "SDK_FILE=${SDK_FILE}" >> "${GITHUB_ENV}"
          wget -nv "${BASE}/${SDK_FILE}"
          sha256sum --check --ignore-missing sha256sums

      - name: 解压 SDK
        run: |
          mkdir sdk
          tar -xaf "${SDK_FILE}" --strip-components=1 -C sdk

      - name: 更新 feeds
        working-directory: sdk
        run: |
          # 只注册本地 src-link，feeds update 无需网络
          printf 'src-link clientstatus_feed %s\n' "${GITHUB_WORKSPACE}" > feeds.conf
          ./scripts/feeds update clientstatus_feed
          ./scripts/feeds install -a -p clientstatus_feed

      - name: 编译 clientstatus
        working-directory: sdk
        run: |
          # 24.10+ SDK 默认产出 .apk，23.05 产出 .ipk，defconfig 自动处理，无需手动设置
          make defconfig
          make package/clientstatus/compile -j$(nproc) V=s 2>&1 | tail -80

      - name: 收集产物
        run: |
          mkdir -p artifacts
          find sdk/bin/ \( -name "clientstatus_*.ipk" -o -name "clientstatus_*.apk" \) \
            -exec cp -v {} artifacts/ \;
          echo "=== 产物列表 ==="
          ls -lh artifacts/
          # 若产物为空则立即报错，防止无声失败
          [ "$(ls -A artifacts/)" ] || { echo "ERROR: 未找到任何产物！"; exit 1; }

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.arch }}-${{ matrix.sdk }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  # ════════════════════════════════════════════════════════
  # Job 2: 打包 luci-app-clientstatus (arch:all)
  # 只下载单个 luci.mk 文件，不克隆整个 LuCI 仓库
  # 每个 SDK 版本只需构建一次（x86_64），产物全架构通用
  # ════════════════════════════════════════════════════════
  build-luci:
    name: LuCI [${{ matrix.sdk }}]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk: 23.05.5
            target: x86
            subtarget: "64"
            luci_branch: openwrt-23.05
          - sdk: 24.10.1
            target: x86
            subtarget: "64"
            luci_branch: openwrt-24.10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential libncurses5-dev python3 rsync zstd

      - name: 下载 OpenWrt SDK (x86_64)
        run: |
          BASE="https://downloads.openwrt.org/releases/${{ matrix.sdk }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}"
          wget -q "${BASE}/sha256sums"
          SDK_FILE=$(grep -o 'openwrt-sdk[^[:space:]]*\.tar\.[a-z]*' sha256sums | head -1)
          echo "SDK_FILE=${SDK_FILE}" >> "${GITHUB_ENV}"
          wget -nv "${BASE}/${SDK_FILE}"
          sha256sum --check --ignore-missing sha256sums

      - name: 解压 SDK
        run: |
          mkdir sdk
          tar -xaf "${SDK_FILE}" --strip-components=1 -C sdk

      - name: 下载 luci.mk（仅单文件，不克隆整个 LuCI 仓库）
        run: |
          mkdir -p /tmp/luci-feed
          # luci.mk 只依赖 SDK 自带的 rules.mk 和 include/*.mk，单文件即可
          curl -fsSL \
            "https://raw.githubusercontent.com/openwrt/luci/${{ matrix.luci_branch }}/luci.mk" \
            -o /tmp/luci-feed/luci.mk
          echo "=== luci.mk 前 5 行 ==="
          head -5 /tmp/luci-feed/luci.mk

      - name: 配置 Feeds
        working-directory: sdk
        run: |
          printf 'src-link clientstatus_feed %s\n' "${GITHUB_WORKSPACE}" > feeds.conf
          printf 'src-link luci %s\n' "/tmp/luci-feed" >> feeds.conf
          # 只更新指定 feed，不访问 git.openwrt.org
          ./scripts/feeds update clientstatus_feed luci
          ./scripts/feeds install -a -p clientstatus_feed

      - name: 编译 luci-app-clientstatus
        working-directory: sdk
        run: |
          # 24.10+ SDK 默认产出 .apk，23.05 产出 .ipk，defconfig 自动处理
          make defconfig
          make package/luci-app-clientstatus/compile -j$(nproc) V=s 2>&1 | tail -80

      - name: 收集产物
        run: |
          mkdir -p artifacts
          find sdk/bin/ \( -name "luci-app-clientstatus_*.ipk" -o -name "luci-app-clientstatus_*.apk" \) \
            -exec cp -v {} artifacts/ \;
          echo "=== 产物列表 ==="
          ls -lh artifacts/
          [ "$(ls -A artifacts/)" ] || { echo "ERROR: 未找到任何产物！"; exit 1; }

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: luci-${{ matrix.sdk }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  # ════════════════════════════════════════════════════════
  # 发布任务：汇总所有产物，创建 GitHub Release
  # ════════════════════════════════════════════════════════
  release:
    name: 发布 GitHub Release
    needs: [build-daemon, build-luci]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: all-packages/
          merge-multiple: true

      - name: 整理发布文件
        run: |
          mkdir -p release-files
          find all-packages/ \( -name "*.ipk" -o -name "*.apk" \) | sort | while read -r f; do
            cp "$f" release-files/
          done
          echo "=== 最终发布文件列表 ==="
          ls -lh release-files/

      - name: 创建 Release 并上传软件包
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          body: |
            ## 📦 软件包说明

            本 Release 包含 `clientstatus` 守护进程和 `luci-app-clientstatus` 界面两个软件包，
            支持 OpenWrt **23.05**（`.ipk`）和 **24.10+**（`.apk`）两种格式。

            ---

            ### 安装方法

            **OpenWrt 23.05 — opkg**
            ```sh
            opkg install clientstatus_*.ipk
            opkg install luci-app-clientstatus_*.ipk
            ```

            **OpenWrt 24.10+ — apk**
            ```sh
            apk add --allow-untrusted clientstatus_*.apk
            apk add --allow-untrusted luci-app-clientstatus_*.apk
            ```

            > ℹ️ `luci-app-clientstatus_*_all.ipk/.apk` 为架构无关包，所有平台通用。
            > 安装完成后请退出并重新登录 LuCI Web 界面。
            > 若界面菜单未显示，请安装 `luci-compat`。

            ---

            ### 支持的架构

            | 架构 | 代表设备 |
            |---|---|
            | `x86_64` | x86 软路由、PVE / ESXi 虚拟机 |
            | `aarch64_generic` | ARMv8 通用（QEMU、RaspberryPi 3/4、各类 arm64 板子）|
            | `arm_cortex-a7_neon-vfpv4` | MT7622、联发科 ARM 系列 |
            | `mipsel_24kc` | MT7620 / MT7628（极路由等）|
            | `mips_24kc` | Atheros AR71xx（TP-Link 经典款）|