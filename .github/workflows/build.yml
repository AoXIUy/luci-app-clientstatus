name: 构建 OpenWrt 软件包

# ─── 触发条件 ────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════
  # Job 1: 编译 clientstatus C 守护进程
  # 无需 LuCI feed，9 个架构并行
  # ════════════════════════════════════════════════════════
  build-daemon:
    name: Daemon [${{ matrix.sdk }}] ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── OpenWrt 23.05.5 (opkg · .ipk) ───────────────
          - { sdk: 23.05.5, arch: x86_64 }
          - { sdk: 23.05.5, arch: aarch64_cortex-a53 }
          - { sdk: 23.05.5, arch: arm_cortex-a7_neon-vfpv4 }
          - { sdk: 23.05.5, arch: mipsel_24kc }
          - { sdk: 23.05.5, arch: mips_24kc }
          # ── OpenWrt 24.10.0 (apk · .apk) ─────────────────
          - { sdk: 24.10.0, arch: x86_64 }
          - { sdk: 24.10.0, arch: aarch64_cortex-a53 }
          - { sdk: 24.10.0, arch: arm_cortex-a7_neon-vfpv4 }
          - { sdk: 24.10.0, arch: mipsel_24kc }

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 只编译 clientstatus，不需要 LuCI feed
      - name: 构建 clientstatus 守护进程
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: clientstatus_feed
          PACKAGES: clientstatus
          NO_REFRESH_CHECK: "true"
          IGNORE_ERRORS: "false"

      - name: 收集构建产物
        run: |
          mkdir -p artifacts
          find bin/packages/ \( -name "clientstatus_*.ipk" -o -name "clientstatus_*.apk" \) \
            | while read -r f; do cp "$f" artifacts/; done
          echo "── 守护进程产物 (${{ matrix.arch }} · ${{ matrix.sdk }}) ──"
          ls -lh artifacts/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.arch }}-${{ matrix.sdk }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  # ════════════════════════════════════════════════════════
  # Job 2: 打包 luci-app-clientstatus (LUCI_PKGARCH:=all)
  # 每个 SDK 版本只需构建一次（x86_64），产物对所有架构通用
  # 使用 GitHub 镜像替代不稳定的 git.openwrt.org
  # ════════════════════════════════════════════════════════
  build-luci:
    name: LuCI App [${{ matrix.sdk }}]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { sdk: 23.05.5, arch: x86_64, luci_branch: openwrt-23.05 }
          - { sdk: 24.10.0, arch: x86_64, luci_branch: openwrt-24.10 }

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 使用 GitHub 镜像（比 git.openwrt.org 在 Actions runner 上更稳定）
      - name: 构建 luci-app-clientstatus (arch:all)
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: clientstatus_feed
          PACKAGES: luci-app-clientstatus
          EXTRA_FEEDS: src-git luci https://github.com/openwrt/luci.git;${{ matrix.luci_branch }}
          NO_REFRESH_CHECK: "true"
          IGNORE_ERRORS: "false"

      - name: 收集构建产物
        run: |
          mkdir -p artifacts
          find bin/packages/ \( -name "luci-app-clientstatus_*.ipk" -o -name "luci-app-clientstatus_*.apk" \) \
            | while read -r f; do cp "$f" artifacts/; done
          echo "── LuCI 产物 (${{ matrix.sdk }}) ──"
          ls -lh artifacts/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: luci-${{ matrix.sdk }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  # ════════════════════════════════════════════════════════
  # 发布任务：汇总所有产物，创建 GitHub Release
  # ════════════════════════════════════════════════════════
  release:
    name: 发布 GitHub Release
    needs: [build-daemon, build-luci]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: 下载所有架构的构建产物
        uses: actions/download-artifact@v4
        with:
          path: all-packages/
          merge-multiple: true

      - name: 整理发布文件
        run: |
          mkdir -p release-files
          find all-packages/ \( -name "*.ipk" -o -name "*.apk" \) | sort | while read -r f; do
            cp "$f" release-files/
          done
          echo "=== 最终发布文件列表 ==="
          ls -lh release-files/

      - name: 创建 Release 并上传软件包
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          body: |
            ## 📦 软件包说明

            本 Release 包含 `clientstatus` 守护进程和 `luci-app-clientstatus` 界面两个软件包，
            支持 OpenWrt **23.05**（`.ipk`）和 **24.10+**（`.apk`）两种格式。

            ---

            ### 安装方法

            **OpenWrt 23.05 — opkg**
            ```sh
            opkg install clientstatus_*.ipk
            opkg install luci-app-clientstatus_*.ipk
            ```

            **OpenWrt 24.10+ — apk**
            ```sh
            apk add --allow-untrusted clientstatus_*.apk
            apk add --allow-untrusted luci-app-clientstatus_*.apk
            ```

            > ℹ️ `luci-app-clientstatus_*_all.ipk/.apk` 为架构无关包，所有平台通用。
            > 安装完成后请退出并重新登录 LuCI Web 界面。
            > 若界面菜单未显示，请安装 `luci-compat`。

            ---

            ### 支持的架构

            | 架构 | 代表设备 |
            |---|---|
            | `x86_64` | x86 软路由、PVE / ESXi 虚拟机 |
            | `aarch64_cortex-a53` | RaspberryPi 3/4、NanoPi R4S、BPi-R3 |
            | `arm_cortex-a7_neon-vfpv4` | MT7622、联发科 ARM 系列 |
            | `mipsel_24kc` | MT7620 / MT7628（极路由等）|
            | `mips_24kc` | Atheros AR71xx（TP-Link 经典款）|